name: Qualys IaC Scan - Terragrunt Plan

on:
  push:
    branches:
      - master
      - dev
    paths:
      - 'dev/**'
      - '.github/workflows/terragrunt_plan.yaml'
  workflow_dispatch:


env:
  AWS_DEFAULT_REGION: us-east-1
  AWS_REGION: us-east-1

jobs:
  iac-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: "0.55.0"

      - name: Terragrunt Init
        run: terragrunt init --terragrunt-non-interactive
        working-directory: dev/us-east-1/lambda/kkkk

      - name: Run Qualys IaC Scan
        uses: Qualys/github_action_qiac@v1.0.2
        env:
          URL: ${{ secrets.URL }}
          UNAME: ${{ secrets.USERNAME }}
          PASS: ${{ secrets.PASSWORD }}
          CURRENT_SHA: ${{ github.sha }}
        with:
          # Points to .terragrunt-cache - this will cause the "No files match" failure
          # because the cache may not contain .tf files or may be empty
          directory: "dev/us-east-1/lambda/kkkk/.terragrunt-cache"
